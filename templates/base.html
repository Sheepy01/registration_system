<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ayushman Manthan Bihar Registration</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

.container{
max-width:500px;
margin:auto;
background:white;
padding:25px;
margin-top:40px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input, select{
width:100%;
padding:10px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:4px;
}

button{
width:100%;
padding:12px;
background:#2c7be5;
color:white;
border:none;
border-radius:4px;
font-size:16px;
}

button:hover{
background:#1a5fcc;
}

.success{
color:green;
text-align:center;
}

.error{
color:red;
}

</style>

</head>

<body>

<div class="container">

{% block content %}

{% endblock %}

</div>

</body>
</html>
