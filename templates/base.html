<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Ayushman Manthan Bihar Registration</title>

<style>

body{
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
margin:0;
padding:0;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
width:90%;
max-width:520px;
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

h1,h2{
text-align:center;
margin-bottom:10px;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:20px;
}

label{
font-weight:600;
font-size:14px;
}

input, select{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:16px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

input:focus, select:focus{
outline:none;
border-color:#2c7be5;
box-shadow:0 0 0 2px rgba(44,123,229,0.2);
}

button{
width:100%;
padding:14px;
background:#2c7be5;
color:white;
border:none;
border-radius:6px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#1a5fcc;
}

.card{
background:#f9fafc;
padding:12px;
border-radius:6px;
margin-bottom:15px;
font-size:14px;
}

.success{
color:#1aa260;
text-align:center;
font-size:22px;
}

.center{
text-align:center;
}

hr{
margin:20px 0;
border:none;
border-top:1px solid #eee;
}

</style>

</head>

<body>

<div class="container">

{% block content %}
{% endblock %}

</div>

</body>
</html>
